name: Deploy staging backend

# Redeploys the staging droplet whenever the `staging` branch moves.
# Runs only on direct pushes to `staging` (collaborators), NOT on fork PRs, so
# the SSH key is never exposed to untrusted code. Staging always re-syncs the
# schema from the models (db:sync) — no migrations to worry about there.
on:
  push:
    branches: [staging]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-staging.yml'

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/pathment 2>/dev/null || cd /root/pathment
            git fetch origin staging
            git checkout staging
            git reset --hard origin/staging
            cd server
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
            # Staging: re-sync schema from models (safe/idempotent — no migrations).
            docker compose -f docker-compose.yml -f docker-compose.staging.yml run --rm api npm run db:sync
            docker compose -f docker-compose.yml -f docker-compose.staging.yml ps
