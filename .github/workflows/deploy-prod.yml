name: Deploy production backend

# Redeploys the production VPS whenever `main` moves: pulls the code and rebuilds
# the container. It deliberately does NOT run migrations — production uses a
# managed DB and schema changes are applied manually (see the note in the logs).
# Auth is by SSH PASSWORD (this VPS has no key configured).
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-prod.yml'

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never interrupt a prod deploy mid-flight

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (password)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_PROD_HOST }}
          username: ${{ secrets.SSH_PROD_USER }}
          password: ${{ secrets.SSH_PROD_PASSWORD }}
          script: |
            set -e
            cd ~/pathment 2>/dev/null || cd /root/pathment
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            cd server
            # Production base compose only (managed DB — no self-contained Postgres).
            docker compose up -d --build
            docker compose ps
            echo ""
            echo "✓ Code deployed. NOTE: migrations are NOT run automatically."
            echo "  If this release needs a schema change, run it manually, e.g.:"
            echo "    docker compose run --rm api node scripts/migrations/<NNN>_*.js"
